<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Interview Tracker | Car Aid Recruiting</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37, 99, 235, 0.4);
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.2);
            --accent-orange: #f59e0b;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --error-red: #f87171;
            --glass-bg: rgba(22, 27, 34, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        /* --- UI COMPONENTS --- */
        .container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease-out;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 80px; 
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-container {
            margin-bottom: 16px;
        }

        .logo-img {
            max-width: 140px;
            height: auto;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .version-badge {
            font-size: 10px;
            background: var(--border-color);
            padding: 2px 8px;
            border-radius: 50px;
            color: var(--text-dim);
            font-weight: 600;
            vertical-align: middle;
            margin-left: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-dim);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 12px var(--accent-blue-glow);
        }

        /* Fast Parse Section */
        .smart-parse-box {
            background: var(--accent-green-glow);
            border: 1px dashed var(--accent-green);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .box-header {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .parse-textarea {
            width: 100%;
            height: 100px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .magic-btn {
            width: 100%;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .magic-btn:active { transform: scale(0.98); }

        /* Form Controls */
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 0px;
        }

        .form-group {
            margin-bottom: 18px;
            flex: 1;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .required-star { color: var(--error-red); margin-left: 2px; }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px var(--accent-blue-glow);
        }

        .submit-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- VIEWS --- */
        #view-list { display: none; }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .count-badge {
            background: var(--border-color);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
        }

        .candidate-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .candidate-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent-blue);
        }

        .cand-name-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .cand-full-name { font-size: 19px; font-weight: 800; color: white; }
        .cand-header-badge { display: none; } /* Replaced by dynamic role badges below */

        .role-badge { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            padding: 4px 10px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .role-advisor { background: #f59e0b; color: white; } /* Vivid Orange */
        .role-tech { background: #a3e635; color: #000; font-weight: 900; } /* Lime Green */
        .role-other { background: var(--border-color); color: var(--text-dim); }

        .cand-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 12px;
        }

        .grid-item { display: flex; align-items: flex-start; gap: 8px; }
        .grid-item span { color: var(--text-main); font-weight: 600; }

        .cand-actions {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .action-btn {
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-transform: uppercase;
        }
        .btn-copy { background: var(--accent-orange); color: white; }
        .btn-edit { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-del { background: rgba(248, 113, 113, 0.05); color: var(--error-red); border: 1px solid rgba(248, 113, 113, 0.2); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: none;
            z-index: 2000;
            white-space: nowrap;
        }

        @keyframes fieldGlow {
            0% { border-color: var(--accent-green); background: var(--accent-green-glow); }
            100% { border-color: var(--border-color); background: var(--input-bg); }
        }
        .parsed-field { animation: fieldGlow 1.5s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="container">
        <div class="card">
            <header>
                <div class="logo-container">
                    <img src="logo.png" alt="Car Aid" class="logo-img" onerror="this.src='https://placehold.co/140x50/161b22/f0f6fc?text=CAR+AID'">
                </div>
                <h1>Interview Tracker <span class="version-badge">v3.1.0 [Upgrade]</span></h1>
                <p class="subtitle">Professional Recruiting Dashboard</p>
            </header>

            <div class="tabs">
                <button class="tab-btn active" id="tab-log" onclick="showView('log')">Log Candidate</button>
                <button class="tab-btn" id="tab-view" onclick="showView('list')">Database</button>
            </div>

            <!-- LOGGING VIEW -->
            <div id="view-log">
                <div class="smart-parse-box">
                    <div class="box-header"><span>🪄 Magic Auto-Fill (Paste Brief)</span></div>
                    <textarea id="raw-text" class="parse-textarea" placeholder="Paste Evans/Jacob summary here..."></textarea>
                    <button class="magic-btn" onclick="runSmartParse()">✨ Magic Auto-Fill Form</button>
                </div>

                <form id="candidate-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name <span class="required-star">*</span></label>
                            <input type="text" id="first_name" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name <span class="required-star">*</span></label>
                            <input type="text" id="last_name" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number <span class="required-star">*</span></label>
                            <input type="tel" id="mobile" placeholder="313-555-0000" required>
                        </div>
                        <div class="form-group">
                            <label>Shop Location <span class="required-star">*</span></label>
                            <input type="text" id="shop" placeholder="Southfield, Waterford..." required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Candidate Role <span class="required-star">*</span></label>
                        <input type="text" id="role" placeholder="A-Level Technician, Advisor..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Years Experience</label>
                            <input type="text" id="exp" placeholder="10+ years">
                        </div>
                        <div class="form-group">
                            <label>Current Shop</label>
                            <input type="text" id="cur_shop" placeholder="Inc Technology">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>ALC / ASE Status</label>
                            <input type="text" id="alc_status" placeholder="Working toward cert">
                        </div>
                        <div class="form-group">
                            <label>Avg RO Size</label>
                            <input type="text" id="ro_size" placeholder="$1,200+">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="email" placeholder="clarence@gmail.com">
                        </div>
                        <div class="form-group">
                            <label>Interview Date</label>
                            <input type="date" id="date">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="notes" rows="2" placeholder="Start date, specialty, etc."></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span>🚀 Log & Save Candidate</span>
                    </button>
                </form>
            </div>

            <!-- DATABASE VIEW -->
            <div id="view-list">
                <div class="list-header">
                    <div class="count-badge"><span id="db-count">0</span> Registered Candidates</div>
                    <button class="download-btn" onclick="downloadCSV()">📥 Export All (CSV)</button>
                </div>
                <div id="candidate-container"></div>
            </div>

            <footer style="text-align:center; margin-top:30px; font-size:11px; color:var(--text-dim); opacity: 0.6;">
                Car Aid Automated Recruiting System v3.1.0<br>
                Secure Local Storage Active
            </footer>
        </div>
    </div>

    <script>
        const DB_NAME = 'caraid_candidates_v3_1'; 
        const LEGACY_KEYS = ['caraid_candidates_v3', 'caraid_candidates_v1', 'caraid_candidates'];

        function getDB() {
            return JSON.parse(localStorage.getItem(DB_NAME) || '[]');
        }

        function saveToDB(data) {
            localStorage.setItem(DB_NAME, JSON.stringify(data));
        }

        // --- MASTER SCAVENGER (v3.1 aware) ---
        function runScavenger() {
            let recovered = 0;
            const current = getDB();
            const currentIds = new Set(current.map(c => c.id));

            LEGACY_KEYS.forEach(key => {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data && Array.isArray(data)) {
                        data.forEach(item => {
                            if (!currentIds.has(item.id)) {
                                // Map old name to first/last if needed
                                let fName = item.first_name || item.name || item.candidate_name || "Unknown";
                                let lName = item.last_name || "";
                                if (!item.first_name && (item.name || item.candidate_name)) {
                                    const parts = (item.name || item.candidate_name).split(' ');
                                    fName = parts[0];
                                    lName = parts.slice(1).join(' ');
                                }

                                const normalized = {
                                    id: item.id || Date.now() + Math.random(),
                                    first_name: fName,
                                    last_name: lName,
                                    mobile: item.mobile || item.phone || "",
                                    email: item.email || "",
                                    shop: item.shop || item.location || "Southfield",
                                    role: item.role || "Technician",
                                    exp: item.exp || item.years_experience || "",
                                    cur_shop: item.cur_shop || item.current_shop || "",
                                    alc_status: item.alc_status || "",
                                    ro_size: item.ro_size || "",
                                    date: item.date || item.interview_date || new Date().toISOString().split('T')[0],
                                    notes: item.notes || ""
                                };
                                current.push(normalized);
                                currentIds.add(normalized.id);
                                recovered++;
                            }
                        });
                    }
                } catch(e) {}
            });

            if (recovered > 0) {
                saveToDB(current);
                showToast(`SUCCESS: Recovered ${recovered} Candidates! 🎉`);
                renderList();
            }
        }

        // --- SMART PARSE 2.0 (Label-Specific) ---
        function runSmartParse() {
            const text = document.getElementById('raw-text').value;
            if (!text.trim()) return showToast("Paste summary first!", "error");

            let found = 0;
            const textLines = text.split('\n');

            const mappings = {
                first_name: /(?:First Name):\s*([^\n\r]+)/i,
                last_name: /(?:Last Name):\s*([^\n\r]+)/i,
                mobile: /(?:Phone Number|Phone):\s*([^\n\r]+)/i,
                email: /(?:Email Address|Email):\s*([^\n\r]+)/i,
                shop: /(?:Shop Location):\s*([^\n\r]+)/i,
                exp: /(?:Years Experience):\s*([^\n\r]+)/i,
                cur_shop: /(?:Current Shop):\s*([^\n\r]+)/i,
                alc_status: /(?:ALC Status|ASE Status):\s*([^\n\r]+)/i,
                ro_size: /(?:Average RO Size):\s*([^\n\r]+)/i
            };

            // Heuristic Role (First line or major keyword)
            const roleMatch = text.match(/(?:A-Level Technician|Service Advisor)/i);
            if (roleMatch && setField('role', roleMatch[0])) found++;

            for (const [id, regex] of Object.entries(mappings)) {
                const match = text.match(regex);
                if (match && setField(id, match[1])) found++;
            }

            // Fallback for phone if no label
            if (!document.getElementById('mobile').value) {
                const genericPhone = text.match(/(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/);
                if (genericPhone && setField('mobile', genericPhone[0])) found++;
            }

            if (found > 0) showToast(`✨ Magic Fill: Found ${found} details!`);
        }

        // --- UI CORE ---
        function showView(view) {
            document.getElementById('view-log').style.display = view === 'log' ? 'block' : 'none';
            document.getElementById('view-list').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('tab-log').className = 'tab-btn' + (view === 'log' ? ' active' : '');
            document.getElementById('tab-view').className = 'tab-btn' + (view === 'list' ? ' active' : '');
            if (view === 'list') renderList();
        }

        function setField(id, val) {
            const el = document.getElementById(id);
            if (!el || !val) return false;
            el.value = val.trim();
            el.classList.add('parsed-field');
            setTimeout(() => el.classList.remove('parsed-field'), 1500);
            return true;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // --- DATABASE OPS ---
        document.getElementById('candidate-form').onsubmit = function(e) {
            e.preventDefault();
            const candidate = {
                id: document.getElementById('edit-id').value || Date.now().toString(),
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                mobile: document.getElementById('mobile').value,
                shop: document.getElementById('shop').value,
                role: document.getElementById('role').value,
                exp: document.getElementById('exp').value,
                cur_shop: document.getElementById('cur_shop').value,
                alc_status: document.getElementById('alc_status').value,
                ro_size: document.getElementById('ro_size').value,
                email: document.getElementById('email').value,
                date: document.getElementById('date').value,
                notes: document.getElementById('notes').value
            };

            const data = getDB();
            const idx = data.findIndex(c => c.id === candidate.id);
            if (idx > -1) data[idx] = candidate;
            else data.unshift(candidate);

            saveToDB(data);
            showToast("Success! Candidate Saved Locally ✅");
            
            this.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('submit-btn').innerHTML = '<span>🚀 Log & Save Candidate</span>';
            document.getElementById('date').valueAsDate = new Date();
            setTimeout(() => showView('list'), 400);
        };

        function renderList() {
            const data = getDB();
            const container = document.getElementById('candidate-container');
            document.getElementById('db-count').innerText = data.length;

            if (data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:60px; opacity:0.4;">Database is empty</div>`;
                return;
            }

            container.innerHTML = data.map(c => {
                const roleClass = c.role.toLowerCase().includes('advisor') ? 'role-advisor' : 
                                 (c.role.toLowerCase().includes('tech') ? 'role-tech' : 'role-other');

                return `
                <div class="candidate-card">
                    <div class="cand-name-row">
                        <div class="cand-full-name">${c.first_name} ${c.last_name}</div>
                        <div class="role-badge ${roleClass}">${c.role}</div>
                    </div>
                    <div class="cand-grid">
                        <div class="grid-item">📞 <span>${c.mobile}</span></div>
                        <div class="grid-item">📍 <span>${c.shop}</span></div>
                        <div class="grid-item">🏢 <span>${c.cur_shop || 'N/A'}</span></div>
                        <div class="grid-item">🏆 <span>${c.exp || 'N/A'}</span></div>
                        <div class="grid-item">🛠️ <span>${c.alc_status || 'N/A'}</span></div>
                        <div class="grid-item">💰 <span>${c.ro_size || 'N/A'}</span></div>
                        <div class="grid-item" style="grid-column: span 2;">✉️ <span>${c.email || 'No email set'}</span></div>
                    </div>
                    <div class="cand-actions">
                        <button class="action-btn btn-copy" onclick="copyBrief('${c.id}')">📋 Copy For Owner</button>
                        <button class="action-btn btn-edit" onclick="editCandidate('${c.id}')">✏️ Edit</button>
                        <button class="action-btn btn-del" onclick="deleteCandidate('${c.id}')">🗑️ Del</button>
                    </div>
                </div>`;
            }).join('');
        }

        function copyBrief(id) {
            const c = getDB().find(item => item.id === id);
            if (!c) return;

            const brief = `CANDIDATE PROFILE: ${c.first_name} ${c.last_name}
-----------------------------
- ROLE: ${c.role}
- LOCATION: ${c.shop}
- PHONE: ${c.mobile}
- EMAIL: ${c.email || 'N/A'}
- EXPERIENCE: ${c.exp}
- CURRENT SHOP: ${c.cur_shop}
- ALC/ASE STATUS: ${c.alc_status}
- AVG RO SIZE: ${c.ro_size}
- INT DATE: ${c.date}

NOTES:
${c.notes || 'None provided.'}`;

            navigator.clipboard.writeText(brief).then(() => {
                showToast("Summary copied to clipboard! 📋");
            });
        }

        function editCandidate(id) {
            const c = getDB().find(item => item.id === id);
            if (!c) return;

            document.getElementById('edit-id').value = c.id;
            document.getElementById('first_name').value = c.first_name;
            document.getElementById('last_name').value = c.last_name;
            document.getElementById('mobile').value = c.mobile;
            document.getElementById('shop').value = c.shop;
            document.getElementById('role').value = c.role;
            document.getElementById('exp').value = c.exp;
            document.getElementById('cur_shop').value = c.cur_shop;
            document.getElementById('alc_status').value = c.alc_status;
            document.getElementById('ro_size').value = c.ro_size;
            document.getElementById('email').value = c.email;
            document.getElementById('date').value = c.date;
            document.getElementById('notes').value = c.notes;

            document.getElementById('submit-btn').innerHTML = '<span>📝 Update Candidate</span>';
            showView('log');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteCandidate(id) {
            if (!confirm("Are you sure?")) return;
            const data = getDB().filter(c => c.id !== id);
            saveToDB(data);
            renderList();
            showToast("Candidate removed.");
        }

        function downloadCSV() {
            const data = getDB();
            if (data.length === 0) return showToast("Nothing to export");

            const headers = ["First Name", "Last Name", "Phone", "Location", "Role", "Exp", "Current Shop", "ASE/ALC", "Avg RO", "Email", "Date"];
            const csv = [headers.join(",")];

            data.forEach(c => {
                const row = [
                    `"${c.first_name}"`, `"${c.last_name}"`, `"${c.mobile}"`, `"${c.shop}"`,
                    `"${c.role}"`, `"${c.exp}"`, `"${c.cur_shop}"`, `"${c.alc_status}"`,
                    `"${c.ro_size}"`, `"${c.email}"`, c.date
                ];
                csv.push(row.join(","));
            });

            const blob = new Blob([csv.join("\n")], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `caraid_full_export_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            showToast("CSV Downloaded!");
        }

        // START
        document.getElementById('date').valueAsDate = new Date();
        runScavenger();
        renderList();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interview Tracker | Car Aid Recruiting</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37, 99, 235, 0.4);
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.2);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --error-red: #f87171;
            --glass-bg: rgba(22, 27, 34, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        /* --- UI COMPONENTS --- */
        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.5s ease-out;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 80px; /* Space for bottom nav */
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-container {
            margin-bottom: 16px;
        }

        .logo-img {
            max-width: 140px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .version-badge {
            font-size: 10px;
            background: var(--border-color);
            padding: 2px 8px;
            border-radius: 50px;
            color: var(--text-dim);
            font-weight: 600;
            vertical-align: middle;
            margin-left: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-dim);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 12px var(--accent-blue-glow);
        }

        /* Fast Parse Section */
        .smart-parse-box {
            background: var(--accent-green-glow);
            border: 1px dashed var(--accent-green);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .box-header {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .parse-textarea {
            width: 100%;
            height: 90px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .magic-btn {
            width: 100%;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .magic-btn:active { transform: scale(0.98); }

        /* Form Controls */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .required-star { color: var(--error-red); margin-left: 2px; }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px var(--accent-blue-glow);
        }

        .error-msg {
            color: var(--error-red);
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- VIEWS --- */
        #view-list { display: none; }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .count-badge {
            background: var(--border-color);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .download-btn {
            background: var(--accent-green-glow);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .candidate-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .candidate-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent-blue);
        }

        .cand-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .cand-name { font-size: 18px; font-weight: 700; color: white; }
        .cand-role { 
            font-size: 10px; 
            font-weight: 700; 
            color: var(--accent-blue); 
            text-transform: uppercase; 
            letter-spacing: 1px;
            background: var(--accent-blue-glow);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .cand-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .cand-item { display: flex; align-items: center; gap: 6px; }

        .cand-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-edit { background: rgba(37, 99, 235, 0.1); color: var(--accent-blue); }
        .btn-del { background: rgba(248, 113, 113, 0.1); color: var(--error-red); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 2000;
        }

        /* Parsing Success Animation */
        @keyframes fieldGlow {
            0% { border-color: var(--accent-green); background: var(--accent-green-glow); }
            100% { border-color: var(--border-color); background: var(--input-bg); }
        }
        .parsed-field { animation: fieldGlow 2s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Debug Footer */
        .debug-log {
            margin-top: 20px;
            font-family: monospace;
            font-size: 9px;
            color: #4ade80;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            max-height: 100px;
            overflow-y: auto;
            display: none;
        }
        
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="container">
        <div class="card">
            <header>
                <div class="logo-container">
                    <img src="logo.png" alt="Car Aid" class="logo-img" onerror="this.src='https://placehold.co/140x50/161b22/f0f6fc?text=CAR+AID'">
                </div>
                <h1>Interview Tracker <span class="version-badge">v3.0.0 [Local]</span></h1>
                <p class="subtitle">Secure Candidate Database</p>
            </header>

            <div class="tabs">
                <button class="tab-btn active" id="tab-log" onclick="showView('log')">Log Interview</button>
                <button class="tab-btn" id="tab-view" onclick="showView('list')">Database</button>
            </div>

            <!-- VIEW 1: LOGGING FORM -->
            <div id="view-log">
                <div class="smart-parse-box">
                    <div class="box-header">
                        <span>🪄 Smart Parse (Paste Summary)</span>
                    </div>
                    <textarea id="raw-text" class="parse-textarea" placeholder="Paste candidate text here... (Smart detection enabled)"></textarea>
                    <button class="magic-btn" onclick="runSmartParse()">✨ Magic Auto-Fill</button>
                </div>

                <form id="candidate-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="form-group">
                        <label>Candidate Name <span class="required-star">*</span></label>
                        <input type="text" id="name" placeholder="Full Name" required>
                        <div class="error-msg" id="name-error">Name is required</div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number <span class="required-star">*</span></label>
                        <input type="tel" id="mobile" placeholder="(555) 000-0000" required>
                    </div>

                    <div class="form-group">
                        <label>Shop Location <span class="required-star">*</span></label>
                        <input type="text" id="shop" placeholder="Waterford, Troy, etc." required>
                    </div>

                    <div class="form-group">
                        <label>Candidate Role <span class="required-star">*</span></label>
                        <input type="text" id="role" placeholder="Service Advisor, Tech..." required>
                    </div>

                    <div class="form-group">
                        <label>Int Date</label>
                        <input type="date" id="date">
                    </div>

                    <div class="form-group">
                        <label>Email (Optional)</label>
                        <input type="email" id="email" placeholder="email@domain.com">
                    </div>

                    <div class="form-row" style="display:flex; gap:12px;">
                        <div class="form-group" style="flex:1">
                            <label>Experience</label>
                            <input type="text" id="exp" placeholder="5+ Years">
                        </div>
                        <div class="form-group" style="flex:1">
                            <label>Current Shop</label>
                            <input type="text" id="cur_shop" placeholder="Dealership">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Specialty & Notes</label>
                        <textarea id="notes" rows="3" placeholder="Additional notes..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span>🚀 Log Candidate</span>
                    </button>
                </form>
            </div>

            <!-- VIEW 2: DATABASE LIST -->
            <div id="view-list">
                <div class="list-header">
                    <div class="count-badge"><span id="db-count">0</span> Candidates</div>
                    <button class="download-btn" onclick="downloadCSV()">📥 Download CSV Export</button>
                </div>
                <div id="candidate-container">
                    <!-- Cards injected here -->
                </div>
            </div>

            <footer style="text-align:center; margin-top:30px; font-size:11px; color:var(--text-dim);">
                Car Aid Automated Gateway • Pure Local Mode<br>
                <div id="debug" class="debug-log"></div>
            </footer>
        </div>
    </div>

    <script>
        // --- CORE DATABASE ---
        const DB_NAME = 'caraid_candidates_v3'; // Fresh start v3 key
        const OLD_KEYS = ['caraid_candidates', 'caraid_candidates_v1', 'caraid_db', 'interview_tracker_db'];

        function getDB() {
            return JSON.parse(localStorage.getItem(DB_NAME) || '[]');
        }

        function saveToDB(data) {
            localStorage.setItem(DB_NAME, JSON.stringify(data));
        }

        // --- THE MASTER SCAVENGER ---
        function runScavenger() {
            logDebug("Starting Master Scavenger...");
            let recovered = 0;
            const current = getDB();
            const currentIds = new Set(current.map(c => c.id || c.name + c.mobile));

            OLD_KEYS.forEach(key => {
                try {
                    const oldData = JSON.parse(localStorage.getItem(key));
                    if (oldData && Array.isArray(oldData)) {
                        oldData.forEach(item => {
                            // Standardize keys from older versions
                            const normalized = {
                                id: item.id || Date.now() + Math.random(),
                                name: item.name || item.candidate_name || "Unknown",
                                mobile: item.mobile || item.phone || "",
                                role: item.role || "Technician",
                                shop: item.shop || item.location || "Southfield",
                                date: item.date || item.interview_date || new Date().toISOString().split('T')[0],
                                email: item.email || "",
                                exp: item.exp || item.years_experience || "",
                                cur_shop: item.cur_shop || item.current_shop || "",
                                notes: item.notes || ""
                            };
                            
                            const signature = normalized.name + normalized.mobile;
                            if (!currentIds.has(signature)) {
                                current.push(normalized);
                                currentIds.add(signature);
                                recovered++;
                            }
                        });
                    }
                } catch(e) {}
            });

            if (recovered > 0) {
                saveToDB(current);
                logDebug(`Scavenger found ${recovered} candidates! 🎉`);
                showToast(`Recovered ${recovered} Candidates! 🎉`);
                renderList();
            } else {
                logDebug("No data found in older versions.");
            }
        }

        // --- SMART PARSE ENGINE ---
        function runSmartParse() {
            const text = document.getElementById('raw-text').value;
            if (!text.trim()) return showToast("Paste text first!", "error");

            logDebug("Running Smart Parse...");
            const textLower = text.toLowerCase();
            let found = 0;

            // 1. Phone Detection (Robust regex for 555-555-5555 formats)
            const phoneMatch = text.match(/(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/);
            if (phoneMatch && setField('mobile', phoneMatch[0])) found++;

            // 2. Role Detection (Keywords)
            if (textLower.includes('advisor')) { if (setField('role', 'Service Advisor')) found++; }
            else if (textLower.includes('tech') || textLower.includes('technician')) { if (setField('role', 'A-Level Technician')) found++; }

            // 3. Location Detection
            const locs = ['Waterford', 'Southfield', 'Utica', 'Shelby', 'Waterford'];
            for (const loc of locs) {
                if (textLower.includes(loc.toLowerCase())) {
                    if (setField('shop', loc)) found++;
                    break;
                }
            }

            // 4. Name Detection (Heuristic: Lines that look like "First Last" or "Name: John")
            const nameMatch = text.match(/(?:Name|Candidate):\s*([^\n\r]+)/i);
            if (nameMatch) {
                if (setField('name', nameMatch[1])) found++;
            } else {
                // Fallback: try first line if it's short
                const firstLine = text.split('\n')[0].trim();
                if (firstLine.length < 30 && firstLine.split(' ').length >= 2) {
                    if (setField('name', firstLine)) found++;
                }
            }

            // 5. Exp & Shop
            const expMatch = text.match(/(?:Exp|Years|Experience):\s*([^\n\r]+)/i);
            if (expMatch) setField('exp', expMatch[1]);

            if (found > 0) showToast(`Smart Fill: Populated ${found} fields!`);
            else showToast("No clear info found in text.", "error");
        }

        // --- UI HANDLERS ---
        function showView(view) {
            const views = { log: 'view-log', list: 'view-list' };
            const tabs = { log: 'tab-log', list: 'tab-view' };
            
            Object.keys(views).forEach(k => {
                document.getElementById(views[k]).style.display = k === view ? 'block' : 'none';
                document.getElementById(tabs[k]).className = 'tab-btn' + (k === view ? ' active' : '');
            });

            if (view === 'list') renderList();
        }

        function setField(id, val) {
            const el = document.getElementById(id);
            if (!el || !val) return false;
            el.value = val.trim();
            el.classList.add('parsed-field');
            setTimeout(() => el.classList.remove('parsed-field'), 2000);
            return true;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = type === 'success' ? 'var(--accent-green)' : 'var(--error-red)';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function logDebug(msg) {
            const db = document.getElementById('debug');
            // db.style.display = 'block'; // Uncomment to see live logs in UI
            db.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            db.scrollTop = db.scrollHeight;
        }

        function forceReload() {
            window.location.href = window.location.pathname + '?refresh=' + Date.now();
        }

        // --- FORM LOGIC ---
        document.getElementById('candidate-form').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '⚡ Saving...';
            
            const candidate = {
                id: document.getElementById('edit-id').value || Date.now().toString(),
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                role: document.getElementById('role').value,
                shop: document.getElementById('shop').value,
                date: document.getElementById('date').value,
                email: document.getElementById('email').value,
                exp: document.getElementById('exp').value,
                cur_shop: document.getElementById('cur_shop').value,
                notes: document.getElementById('notes').value
            };

            const data = getDB();
            const index = data.findIndex(c => c.id === candidate.id);
            
            if (index > -1) data[index] = candidate;
            else data.unshift(candidate);

            saveToDB(data);
            showToast("Candidate Saved Successfully!");
            
            this.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('submit-btn').innerHTML = '<span>🚀 Log Candidate</span>';
            document.getElementById('date').valueAsDate = new Date();
            
            setTimeout(() => showView('list'), 500);
        };

        function renderList() {
            const data = getDB();
            const container = document.getElementById('candidate-container');
            document.getElementById('db-count').innerText = data.length;

            if (data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-dim);">No candidates in database yet.</div>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="candidate-card">
                    <div class="cand-header">
                        <div class="cand-name">${c.name}</div>
                        <div class="cand-role">${c.role}</div>
                    </div>
                    <div class="cand-info">
                        <div class="cand-item">📞 ${c.mobile}</div>
                        <div class="cand-item">📍 ${c.shop}</div>
                        <div class="cand-item">📅 ${c.date}</div>
                        ${c.email ? `<div class="cand-item">✉️ Email set</div>` : ''}
                    </div>
                    <div class="cand-actions">
                        <button class="action-btn btn-edit" onclick="editCandidate('${c.id}')">✏️ Edit</button>
                        <button class="action-btn btn-del" onclick="deleteCandidate('${c.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function editCandidate(id) {
            const data = getDB();
            const cand = data.find(c => c.id === id);
            if (!cand) return;

            document.getElementById('edit-id').value = cand.id;
            document.getElementById('name').value = cand.name;
            document.getElementById('mobile').value = cand.mobile;
            document.getElementById('role').value = cand.role;
            document.getElementById('shop').value = cand.shop;
            document.getElementById('date').value = cand.date;
            document.getElementById('email').value = cand.email;
            document.getElementById('exp').value = cand.exp;
            document.getElementById('cur_shop').value = cand.cur_shop;
            document.getElementById('notes').value = cand.notes;

            document.getElementById('submit-btn').innerHTML = '<span>📝 Update Record</span>';
            showView('log');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteCandidate(id) {
            if (!confirm("Are you sure? This cannot be undone.")) return;
            const data = getDB().filter(c => c.id !== id);
            saveToDB(data);
            renderList();
            showToast("Record Deleted");
        }

        function downloadCSV() {
            const data = getDB();
            if (data.length === 0) return showToast("No data to export", "error");

            const headers = ["Name", "Phone", "Role", "Location", "Date", "Email", "Experience", "Notes"];
            const csvRows = [headers.join(",")];

            data.forEach(c => {
                const row = [
                    `"${c.name}"`, `"${c.mobile}"`, `"${c.role}"`, `"${c.shop}"`,
                    c.date, `"${c.email}"`, `"${c.exp}"`, `"${c.notes.replace(/\n/g, ' ')}"`
                ];
                csvRows.push(row.join(","));
            });

            const blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `caraid_export_${new Date().toISOString().split('T')[0]}.csv`);
            a.click();
            showToast("CSV Exported! Check Downloads.");
        }

        // INIT
        document.getElementById('date').valueAsDate = new Date();
        runScavenger();
        renderList();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Tracker | Car Aid Recruiting</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-blue: #2563eb;
            --hover-blue: #3b82f6;
            --success-green: #10b981;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --input-bg: rgba(13, 17, 23, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        /* Main Container matching the screenshot */
        .card {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        /* Header Layout */
        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-placeholder {
            width: 80px;
            height: 48px;
            margin: 0 auto 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .tab-btn.inactive {
            background: #21262d;
            color: var(--text-dim);
        }

        /* Fast Parse Section */
        .parse-container {
            border: 1px dashed #4ade8050;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #4ade80;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .parse-textarea {
            width: 100%;
            height: 80px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .parse-textarea:focus { border-color: #4ade8050; }

        .magic-btn {
            width: 100%;
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            appearance: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--hover-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Custom Select Arrow */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '↕';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
            font-size: 12px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: var(--text-main);
            color: black;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s;
        }
        .submit-btn:active { transform: scale(0.98); }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Views */
        #view-candidates-section { display: none; }

        /* Candidate Card */
        .candidate-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .candidate-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .candidate-name { font-weight: 700; font-size: 16px; }
        .candidate-role { font-size: 11px; font-weight: 700; color: var(--primary-blue); text-transform: uppercase; letter-spacing: 0.5px; }
        .candidate-meta { font-size: 13px; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; }

        /* Toast */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            z-index: 1000;
            display: none;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .toast-success { background: #10b981; color: white; }
        .toast-error { background: #ef4444; color: white; }

        /* Parsing Success Animation */
        @keyframes field-glow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); border-color: #4ade80; }
            50% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0.1); border-color: #4ade80; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); border-color: var(--border-color); }
        }
        .field-success {
            animation: field-glow 1.5s ease-out;
        }

        /* Debug UI */
        #debug-console {
            margin-top: 24px;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            font-family: monospace;
            font-size: 10px;
            color: #4ade80;
            max-height: 120px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="card">
        <header>
            <div class="logo-placeholder" style="background: none; border: none;">
                <img src="logo.png" alt="Car Aid" class="logo-img" style="width: 120px; height: auto;">
            </div>
            <h1>Car Aid Interview Tracker <small style="font-size: 10px; opacity: 0.5;">v4.0.2</small></h1>
            <p class="subtitle">Unblockable Relay Dashboard</p>
            <div id="sync-status" style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px;">
                ☁️ Sync Status: <span id="status-text">Connecting...</span>
            </div>
            <button onclick="forceReload()" style="background: none; border: 1px solid var(--border-color); color: var(--text-dim); padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;">
                🔄 Force Hard Reload (Relay Sync v4.0.2)
            </button>
            <div id="nw-warning" style="display:none; font-size:11px; color:#f87171; background:rgba(248,113,113,0.1); padding:8px; border-radius:8px; margin-top:12px;">
                ⚠️ <b>Network Block Detected:</b> Your Wi-Fi or VPN is blocking Google. Try switching to LTE/Data.
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-log" onclick="switchTab('log')">Log Interview View</button>
            <button class="tab-btn inactive" id="tab-view" onclick="switchTab('view')">View Candidates</button>
        </div>

        <!-- Logging Form Section -->
        <div id="log-interview-section">
            <div class="parse-container">
                <div class="section-title">
                    <span>⚡ Fast Parse (Paste Summary Below)</span>
                </div>
                <textarea id="raw-summary" class="parse-textarea" placeholder="Paste candidate summary here... (Name, Phone, etc.)"></textarea>
                <button type="button" onclick="handleMagicFill()" class="magic-btn">🪄 Magic Auto-Fill</button>
            </div>

            <form id="tracker-form">
                <div class="form-group">
                    <label>Candidate Name (First / Last)</label>
                    <input type="text" name="candidate_name" id="candidate_name" placeholder="Jonathan Shumake II" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" id="phone" placeholder="(555) 000-0000" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" id="email" placeholder="candidate@email.com">
                </div>

                <div class="form-group">
                    <label>Sent for Interview On</label>
                    <input type="date" name="interview_date" id="interview_date" required>
                </div>

                <div class="form-group">
                    <label>Shop Location</label>
                    <input type="text" name="location" id="location" placeholder="Southfield, Troy, Waterford..." required>
                </div>

                <div class="form-group">
                    <label>Candidate Role</label>
                    <input type="text" name="role" id="role" placeholder="A-Level Technician or Service Advisor..." required>
                </div>

                <div class="form-row" style="display: flex; gap: 12px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Years Experience</label>
                        <input type="text" name="years_experience" id="years_experience" placeholder="10+ years">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Current Shop</label>
                        <input type="text" name="current_shop" id="current_shop" placeholder="Belle Tire">
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 12px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Avg RO Size</label>
                        <input type="text" name="ro_size" id="ro_size" placeholder="$700-$1,200">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>ASE Status</label>
                        <input type="text" name="ase_status" id="ase_status" placeholder="L1/A8 or Yes">
                    </div>
                </div>

                <div class="form-group">
                    <label>Interviewer</label>
                    <input type="text" name="interviewer" id="interviewer" value="Sal" required>
                </div>

                <div class="form-group">
                    <label>Specialty & Notes</label>
                    <textarea name="notes" id="notes" rows="4" placeholder="Solid background, eager to start..."></textarea>
                </div>

                <input type="hidden" name="editing_id" id="editing_id">

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span>🚀 Log Interview</span>
                </button>
            </form>
        </div>

        <!-- Candidate Viewing Section -->
        <div id="view-candidates-section">
            <div id="candidates-list">
                <p style="text-align: center; color: var(--text-dim); padding: 40px 0;">Loading candidates...</p>
            </div>
        </div>

        <footer>
            Car Aid Recruiting © 2026<br>
            Stable Gateway Deployment
            <div id="debug-console"></div>
        </footer>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwaC1bX0BPlLrPrwaVg29mk7A70vGaGtRgncAyLzCWWoB3Ku2hRxVZUxXXjXC2o27IFwQ/exec';
 
        const DB_KEY = 'caraid_candidates_v1';

        // --- UI LOGIC ---
        function switchTab(tab) {
            const logSection = document.getElementById('log-interview-section');
            const viewSection = document.getElementById('view-candidates-section');
            const logTab = document.getElementById('tab-log');
            const viewTab = document.getElementById('tab-view');

            if (tab === 'log') {
                logSection.style.display = 'block';
                viewSection.style.display = 'none';
                logTab.className = 'tab-btn active';
                viewTab.className = 'tab-btn inactive';
            } else {
                logSection.style.display = 'none';
                viewSection.style.display = 'block';
                logTab.className = 'tab-btn inactive';
                viewTab.className = 'tab-btn active';
                loadCandidates();
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = type === 'success' ? 'toast-success' : 'toast-error';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function logDebug(msg) {
            const console = document.getElementById('debug-console');
            console.style.display = 'block';
            console.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            console.scrollTop = console.scrollHeight;
        }

        function forceReload() {
            window.location.href = window.location.pathname + '?v=' + Date.now();
        }

        function updateSyncUI(status, msg) {
            const statusText = document.getElementById('status-text');
            if (!statusText) return;
            statusText.innerText = msg;
            statusText.style.color = status === 'ok' ? '#10b981' : '#ef4444';
        }

-        logDebug("Car Aid Tracker v2.8 initialized.");
+        logDebug("Car Aid Tracker v4.0.1 [GitHub Relay] initialized.");

        // --- UTILITY LOGIC ---
        function fillAndGlow(id, value) {
            const el = document.getElementById(id);
            if (!el || !value) return false;
            
            el.value = value.trim();
            el.classList.remove('field-success');
            void el.offsetWidth; // Trigger reflow
            el.classList.add('field-success');
            return true;
        }

        // Set default date to today
        document.getElementById('interview_date').valueAsDate = new Date();

        // --- HIGH-RELIABILITY MAGIC AUTO-FILL ---
        function handleMagicFill() {
            logDebug("Magic wand ✨ triggered...");
            const text = document.getElementById('raw-summary').value;
            if (!text.trim()) {
                showToast("Please paste some text first!", "error");
                logDebug("Error: No text in box.");
                return;
            }

            let foundCount = 0;

            // 1. Basic Info (Name, Phone, Email)
            const firstName = (text.match(/(?:First Name|Name):\s*([^\n\r]+)/i) || [])[1] || "";
            const lastName = (text.match(/Last Name:\s*([^\n\r]+)/i) || [])[1] || "";
            if (firstName || lastName) {
                if (fillAndGlow('candidate_name', `${firstName} ${lastName}`)) {
                    foundCount++;
                    logDebug(`Found Name: ${firstName} ${lastName}`);
                }
            }

            const phone = (text.match(/(?:Phone Number|Phone):\s*([\d\-\(\)\s]+)/i) || [])[1];
            if (fillAndGlow('phone', phone)) {
                 foundCount++;
                 logDebug(`Found Phone: ${phone}`);
            }

            const email = (text.match(/(?:Email Address|Email|@):\s*([^\s@]+@[^\s@]+\.[^\s@]+)/i) || [])[1];
            if (fillAndGlow('email', email)) {
                foundCount++;
                logDebug(`Found Email: ${email}`);
            }

            // 2. Role Detection (Top 1000 chars)
            const topText = text.substring(0, 1000).toLowerCase();
            let detectedRole = "";
            if (topText.includes("advisor")) detectedRole = "Service Advisor";
            else if (topText.includes("tech") || topText.includes("technician")) detectedRole = "A-Level Technician";
            
            if (detectedRole && fillAndGlow('role', detectedRole)) {
                foundCount++;
                logDebug(`Role Detected: ${detectedRole}`);
            } else {
                logDebug("Role Search: No keyword match in intro.");
            }

            // 3. Location Detection (Loop keywords)
            const locations = ["Waterford", "Southfield", "Utica", "Shelby Township", "Troy"];
            let foundLoc = false;
            for (const loc of locations) {
                if (text.toLowerCase().includes(loc.toLowerCase())) {
                    if (fillAndGlow('location', loc)) {
                        foundCount++;
                        logDebug(`Location Found: ${loc}`);
                        foundLoc = true;
                    }
                    break;
                }
            }
            if (!foundLoc) logDebug("Location Search: No keywords found in summary.");

            // 4. Detailed Pro Info
            const fields = [
                { id: 'years_experience', name: 'Years Exp', regex: /Years Experience:\s*([^\n\r]+)/i },
                { id: 'current_shop', name: 'Cur Shop', regex: /Current Shop:\s*([^\n\r]+)/i },
                { id: 'pay_range', name: 'Pay Range', regex: /Pay Range:\s*([^\n\r]+)/i },
                { id: 'ro_size', name: 'RO Size', regex: /Average RO Size:\s*([^\n\r]+)/i },
                { id: 'ase_status', name: 'ASE Status', regex: /ASE Status:\s*([^\n\r]+)/i },
                { id: 'notes', name: 'Specialty', regex: /Specialty:\s*([^\n\r]+)/i }
            ];

            fields.forEach(field => {
                const match = (text.match(field.regex) || [])[1];
                if (match && fillAndGlow(field.id, match)) {
                    foundCount++;
                    logDebug(`Field Found: ${field.name}`);
                }
            });

            if (foundCount > 0) {
                showToast(`Magic Fill Complete! ✨ Updated ${foundCount} fields.`);
                logDebug(`Fill Successful: ${foundCount} items.`);
            } else {
                showToast("Magic Wand found no matches. Check format.", "error");
                logDebug("Search Ended: 0 matches found.");
            }
        }

        // --- SUBMISSION LOGIC ---
        const form = document.getElementById('tracker-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const editingId = document.getElementById('editing_id').value;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>⏳ ${editingId ? 'Updating...' : 'Saving...'}</span>`;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Add fallback name and ID
            if (!data.candidate_name) data.candidate_name = "Walk-in / Unknown";
            data.timestamp = new Date().toISOString();
            try {
                // Save to Cloud (Google Sheets)
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                // Also update local cache for instant feedback
                const existing = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
                if (editingId) {
                    const idx = existing.findIndex(c => c.id === editingId);
                    if (idx !== -1) {
                        data.id = editingId;
                        existing[idx] = data;
                    }
                } else {
                    data.id = data.id || Date.now().toString();
                    existing.unshift(data);
                }
                localStorage.setItem(DB_KEY, JSON.stringify(existing));

                showToast(editingId ? "Candidate updated in cloud! ✨" : "Candidate saved to cloud! ✅");
                form.reset();
                document.getElementById('editing_id').value = "";
                document.getElementById('raw-summary').value = "";
                document.getElementById('interview_date').valueAsDate = new Date();
                submitBtn.innerHTML = "<span>🚀 Log Interview</span>";
                
                setTimeout(() => switchTab('view'), 800);

            } catch (err) {
                console.error(err);
                showToast("Error connecting to cloud.", "error");
            } finally {
                submitBtn.disabled = false;
            }
        });

        // --- UNBLOCKABLE RELAY v4.0 (GITHUB BYPASS) ---
        async function loadCandidates() {
            const list = document.getElementById('candidates-list');
            const nwWarning = document.getElementById('nw-warning');
            
            // 1. Show local cache immediately for speed
            const cached = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
            renderList(cached);
            logDebug(`[Cache] Loaded ${cached.length} records.`);

            updateSyncUI('pending', 'GitHub Relay Sync (v4.0)...');
            
            try {
                // Fetch the JSON file that GitHub Action generates
                // We add a timestamp to bypass GitHub Pages cache
                const response = await fetch(`candidates.json?t=${Date.now()}`);
                
                if (!response.ok) throw new Error('Relay file not ready yet.');
                
                const cloudData = await response.json();
                
                logDebug(`[Success] Relay OK: Synced ${cloudData.length} records.`);
                if (nwWarning) nwWarning.style.display = 'none';
                
                localStorage.setItem(DB_KEY, JSON.stringify(cloudData));
                renderList(cloudData);
                updateSyncUI('ok', 'Connected (GitHub Relay)');
                
            } catch (err) {
                logDebug(`[Relay] Fetching secondary backup...`);
                // Fallback to direct proxy if relay file is missing
                loadCandidatesFallback();
            }
        }

        // Fallback to v3.0 Proxy if Relay file hasn't been generated yet
        function loadCandidatesFallback() {
            const callbackName = 'fallback_cb_' + Date.now();
            window[callbackName] = function(cloudData) {
                logDebug(`[Success] Backup Bridge OK.`);
                localStorage.setItem(DB_KEY, JSON.stringify(cloudData));
                renderList(cloudData);
                updateSyncUI('ok', 'Connected (Backup Relay)');
                delete window[callbackName];
            };
            const script = document.createElement('script');
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(SCRIPT_URL + '?callback=' + callbackName)}&callback=${callbackName}`;
            script.src = proxyUrl;
            document.body.appendChild(script);
        }

        function renderList(data) {
            const list = document.getElementById('candidates-list');
            if (data.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; color: var(--text-dim); padding: 60px 20px;">
                        <span style="font-size: 40px; display: block; margin-bottom: 20px; opacity: 0.3;">☁️</span>
                        <p>No candidates in cloud yet.</p>
                    </div>`;
                return;
            }

            list.innerHTML = data.map(c => `
                <div class="candidate-card">
                    <div class="candidate-header">
                        <span class="candidate-name">${c.candidate_name}</span>
                        <span class="candidate-role">${c.role}</span>
                    </div>
                    <div class="candidate-meta">
                        <span>📞 ${c.phone}</span>
                        ${c.email ? `<span>📧 ${c.email}</span>` : ''}
                        <span>📍 ${c.location}</span>
                        ${c.years_experience ? `<span>⏳ Exp: ${c.years_experience}</span>` : ''}
                        ${c.current_shop ? `<span>🏢 Shop: ${c.current_shop}</span>` : ''}
                        ${c.ro_size ? `<span>💰 RO: ${c.ro_size}</span>` : ''}
                        ${c.ase_status ? `<span>🛡️ ASE: ${c.ase_status}</span>` : ''}
                        <span>👤 Interviewer: ${c.interviewer}</span>
                        <span>📅 Date: ${new Date(c.interview_date).toLocaleDateString()}</span>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
                        <button onclick="editCandidate('${c.id}')" style="flex: 1; background: none; border: 1px solid var(--primary-blue); border-radius: 6px; color: var(--primary-blue); font-size: 11px; padding: 6px; cursor: pointer; font-weight: 600;">
                            ✏️ Edit Info
                        </button>
                        <button onclick="deleteCandidate('${c.id}')" style="background: none; border: none; color: #ef4444; font-size: 11px; padding: 6px; cursor: pointer; opacity: 0.7;">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function editCandidate(id) {
            const data = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
            const candidate = data.find(c => c.id === id);
            
            if (candidate) {
                // Populate all fields
                document.getElementById('editing_id').value = candidate.id;
                document.getElementById('candidate_name').value = candidate.candidate_name;
                document.getElementById('phone').value = candidate.phone;
                document.getElementById('email').value = candidate.email;
                document.getElementById('location').value = candidate.location;
                document.getElementById('role').value = candidate.role;
                document.getElementById('years_experience').value = candidate.years_experience || "";
                document.getElementById('current_shop').value = candidate.current_shop || "";
                document.getElementById('ro_size').value = candidate.ro_size || "";
                document.getElementById('pay_range').value = candidate.pay_range || "";
                document.getElementById('ase_status').value = candidate.ase_status || "";
                document.getElementById('notes').value = candidate.notes;
                
                // Switch to form tab and change button text
                switchTab('log');
                document.getElementById('submit-btn').innerHTML = "<span>📝 Update Candidate</span>";
                showToast("Candidate info populated in form.");
            }
        }

        function deleteCandidate(id) {
            if (confirm("Are you sure you want to delete this candidate record?")) {
                const existing = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
                const filtered = existing.filter(c => c.id !== id);
                localStorage.setItem(DB_KEY, JSON.stringify(filtered));
                loadCandidates();
                showToast("Record deleted.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interview Tracker Pro | Car Aid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-blue: #2563eb;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-lime: #a3e635;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --error-red: #f87171;
            --glass-bg: rgba(22, 27, 34, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        .container { width: 100%; max-width: 500px; margin: 0 auto; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        header { text-align: center; margin-bottom: 24px; }
        .logo-img { max-width: 130px; height: auto; margin-bottom: 12px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 24px; letter-spacing: -0.5px; }
        .version-badge { font-size: 10px; background: #238636; color: white; padding: 2px 10px; border-radius: 50px; margin-left: 8px; vertical-align: middle; }

        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 18px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--accent-blue); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }

        /* Parsing UI */
        .smart-parse-box {
            background: rgba(16, 185, 129, 0.08);
            border: 1px dashed var(--accent-green);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .box-header { font-size: 12px; font-weight: 800; color: var(--accent-green); margin-bottom: 12px; text-transform: uppercase; }
        .parse-textarea { width: 100%; height: 110px; background: #000; border: 1px solid var(--border-color); border-radius: 14px; color: white; padding: 14px; font-size: 15px; resize: none; outline: none; }
        .magic-btn { width: 100%; background: var(--accent-green); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 800; margin-top: 12px; cursor: pointer; }

        /* Form */
        .form-row { display: flex; gap: 12px; }
        .form-group { margin-bottom: 18px; flex: 1; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 6px; color: var(--text-dim); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 15px; color: white; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(37,99,235,0.2); }
        .submit-btn { width: 100%; background: white; color: black; border: none; border-radius: 16px; padding: 18px; font-size: 16px; font-weight: 900; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Candidate List Cleaner UI */
        .candidate-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 20px; 
            position: relative;
            overflow: hidden;
        }
        .candidate-card::before { 
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent-blue); 
        }

        .cand-name-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 15px; }
        .cand-full-name { font-weight: 800; font-size: 19px; line-height: 1.2; flex: 1; min-width: 0; word-wrap: break-word; color: white; }
        
        .role-badge { 
            font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; flex-shrink: 0; white-space: nowrap; margin-top: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .role-advisor { background: #f59e0b; color: white; }
        .role-tech { background: #a3e635; color: black; }

        .cand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 15px; font-size: 13px; color: var(--text-dim); }
        .grid-item { display: flex; align-items: center; gap: 8px; overflow: visible; }
        .grid-row-full { grid-column: span 2; display: flex; align-items: center; gap: 8px; overflow: visible; margin-top: 4px; }
        .grid-item b, .grid-row-full b { color: white; font-weight: 600; white-space: normal; word-break: break-all; }

        .icon-svg { width: 16px; height: 16px; flex-shrink: 0; }
        .icon-phone { fill: #10b981; }
        .icon-email { fill: #3b82f6; }
        .icon-loc { fill: #f87171; }
        .icon-exp { fill: #fbbf24; }

        .ase-img { height: 20px; width: auto; vertical-align: middle; border-radius: 2px; flex-shrink: 0; }
        
        .cand-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .action-btn { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-copy { background: var(--accent-orange); color: white; flex: 2; height: 48px; }
        .btn-edit { background: rgba(255,255,255,0.05); color: white; flex: 1; border: 1px solid var(--border-color); height: 48px; }
        .btn-del { background: rgba(248,113,113,0.05); color: #f87171; border: 1px solid rgba(248,113,113,0.2); flex: 1; height: 48px; }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 20px 30px; border-radius: 20px;
            font-weight: 900; z-index: 10000; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: none; text-align: center; min-width: 280px; border: 2px solid rgba(255,255,255,0.3);
        }

        @keyframes fieldGlow { 0% { background: rgba(16,185,129,0.3); } 100% { background: var(--input-bg); } }
        .parsed-field { animation: fieldGlow 1s forwards; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="container">
        <div class="card">
            <header>
                <img src="logo.png" alt="Car Aid" class="logo-img" onerror="this.src='https://placehold.co/140x50/161b22/f0f6fc?text=CAR+AID'">
                <h1>Recruiting Pro <span class="version-badge">v3.2.0</span></h1>
                <button onclick="location.reload(true)" style="background:rgba(255,255,255,0.05); color:var(--text-dim); border:1px solid var(--border-color); padding:6px 12px; border-radius:10px; font-size:11px; font-weight:800; margin-top:10px; cursor:pointer;">🔄 Force Hard Reload</button>
            </header>

            <div class="tabs">
                <button class="tab-btn active" id="tab-log" onclick="showView('log')">NEW INTERVIEW</button>
                <button class="tab-btn" id="tab-view" onclick="showView('list')">DATABASE</button>
            </div>

            <div id="view-log">
                <div class="smart-parse-box">
                    <div class="box-header">⚡ MAGIC SCAN</div>
                    <textarea id="raw-text" class="parse-textarea" placeholder="Paste Evans/Jacob summary here..."></textarea>
                    <button class="magic-btn" onclick="runSmartParse()">✨ SCAN & AUTO-FILL FORM</button>
                </div>

                <form id="candidate-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-row">
                        <div class="form-group"><label>First Name</label><input type="text" id="first_name" required></div>
                        <div class="form-group"><label>Last Name</label><input type="text" id="last_name" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Phone</label><input type="tel" id="mobile" required></div>
                        <div class="form-group"><label>Shop Location</label><input type="text" id="shop" required></div>
                    </div>
                    <div class="form-group"><label>Role</label><input type="text" id="role" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>Years Exp</label><input type="text" id="exp"></div>
                        <div class="form-group"><label>Current Shop</label><input type="text" id="cur_shop"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>ALC / ASE Status</label><input type="text" id="alc_status"></div>
                        <div class="form-group"><label>Avg RO Size</label><input type="text" id="ro_size"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
                        <div class="form-group"><label>Date</label><input type="date" id="date"></div>
                    </div>
                    <div class="form-group"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
                    <button type="submit" class="submit-btn" id="submit-btn">🚀 SAVE CANDIDATE</button>
                </form>
            </div>

            <div id="view-list" style="display:none;">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                    <div style="font-weight:800; font-size:14px; color:var(--text-dim);">Total: <span id="db-count" style="color:white;">0</span></div>
                    <button onclick="downloadCSV()" style="background:transparent; color:var(--accent-green); border:1px solid; padding:6px 12px; border-radius:10px; font-size:11px; font-weight:800; cursor:pointer;">📥 DOWNLOAD CSV</button>
                </div>
                <div id="candidate-container"></div>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'caraid_candidates_v3_1';
        const getDB = () => JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        const saveDB = (d) => localStorage.setItem(DB_KEY, JSON.stringify(d));

        function showToast(msg, error = false) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.background = error ? '#ef4444' : '#10b981';
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 4000);
        }

        function setField(id, val) {
            const el = document.getElementById(id);
            if (el && val && val.trim()) {
                el.value = val.trim();
                el.classList.add('parsed-field');
                setTimeout(() => el.classList.remove('parsed-field'), 1000);
                return true;
            }
            return false;
        }

        function runSmartParse() {
            const text = document.getElementById('raw-text').value;
            if (!text.trim()) return showToast("Paste text first!", true);

            let found = 0;
            const textLower = text.toLowerCase();

            // 1. ROLES & LOCATIONS
            if (textLower.includes('service advisor') || textLower.includes('advisor')) { 
                if (setField('role', 'Service Advisor')) found++; 
            } else if (textLower.includes('a-level technician') || textLower.includes('technician') || textLower.includes('tech')) { 
                if (setField('role', 'A-Level Technician')) found++; 
            }

            const locs = ['southfield', 'waterford', 'troy', 'shelby township', 'utica'];
            for (const l of locs) {
                if (textLower.includes(l)) {
                    const formatted = l.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    if (setField('shop', formatted)) { found++; break; }
                }
            }

            // 2. KEYWORDS
            const map = [
                { id: 'first_name', keys: ['first name'] },
                { id: 'last_name', keys: ['last name'] },
                { id: 'mobile', keys: ['phone number', 'phone'] },
                { id: 'email', keys: ['email address', 'email'] },
                { id: 'shop', keys: ['shop location', 'shop'] },
                { id: 'exp', keys: ['years experience', 'years'] },
                { id: 'cur_shop', keys: ['current shop'] },
                { id: 'alc_status', keys: ['alc status', 'ase status'] },
                { id: 'ro_size', keys: ['average ro size', 'ro size'] }
            ];

            text.split('\n').forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const key = parts[0].toLowerCase().trim();
                    const val = parts.slice(1).join(':').trim();
                    map.forEach(m => {
                        if (m.keys.some(k => key.includes(k)) && val) {
                            if (setField(m.id, val)) found++;
                        }
                    });
                }
            });

            // 3. PHONE FALLBACK
            if (!document.getElementById('mobile').value) {
                const p = text.match(/(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/);
                if (p && setField('mobile', p[0])) found++;
            }

            if (found > 0) showToast(`✅ SUCCESS!\nScanned ${found} details.`);
            else showToast("❌ NO DATA FOUND.\nCheck labels/colons.", true);
        }

        document.getElementById('candidate-form').onsubmit = function(e) {
            e.preventDefault();
            const cand = {
                id: document.getElementById('edit-id').value || Date.now().toString(),
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                mobile: document.getElementById('mobile').value,
                shop: document.getElementById('shop').value,
                role: document.getElementById('role').value,
                exp: document.getElementById('exp').value,
                cur_shop: document.getElementById('cur_shop').value,
                alc_status: document.getElementById('alc_status').value,
                ro_size: document.getElementById('ro_size').value,
                email: document.getElementById('email').value,
                date: document.getElementById('date').value,
                notes: document.getElementById('notes').value
            };
            const db = getDB();
            const idx = db.findIndex(c => c.id === cand.id);
            if (idx > -1) db[idx] = cand; else db.unshift(cand);
            saveDB(db);
            showToast("CANDIDATE SAVED! ✅");
            this.reset(); document.getElementById('edit-id').value = "";
            document.getElementById('date').valueAsDate = new Date();
            setTimeout(() => showView('list'), 400);
        };

        function renderList() {
            const data = getDB();
            const container = document.getElementById('candidate-container');
            document.getElementById('db-count').innerText = data.length;
            if (data.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.3;">Empty</div>'; return; }
            container.innerHTML = data.map(c => {
                const isAdv = c.role && c.role.toLowerCase().includes('advisor');
                return `
                <div class="candidate-card">
                    <div class="cand-name-row">
                        <div class="cand-full-name">${c.first_name || ''} ${c.last_name || ''}</div>
                        <div class="role-badge ${isAdv ? 'role-advisor' : 'role-tech'}">${c.role || 'ROLE'}</div>
                    </div>
                    <div class="cand-grid">
                        <div class="grid-row-full">
                            <svg class="icon-svg icon-phone" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                            <b>${c.mobile || 'N/A'}</b>
                        </div>
                        <div class="grid-row-full">
                            <svg class="icon-svg icon-email" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                            <b>${c.email || 'N/A'}</b>
                        </div>
                        <div class="grid-item">
                            <svg class="icon-svg icon-loc" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                            <b>${c.shop || 'N/A'}</b>
                        </div>
                        <div class="grid-item">
                            <svg class="icon-svg icon-exp" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                            <b>${c.exp || 'N/A'}</b>
                        </div>
                        <div class="grid-row-full" style="padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.05);">
                            <img src="ase_badge.png" class="ase-img" onerror="this.style.display='none'"> 
                            <b>${c.alc_status || 'N/A'}</b> • 💰 <b>${c.ro_size || 'N/A'}</b>
                        </div>
                    </div>
                    <div class="cand-actions">
                        <button class="action-btn btn-copy" onclick="copyBrief('${c.id}')">📋 SHARE</button>
                        <button class="action-btn btn-edit" onclick="editCandidate('${c.id}')">✏️ EDIT</button>
                        <button class="action-btn btn-del" onclick="deleteCandidate('${c.id}')">🗑️ DEL</button>
                    </div>
                </div>`;
            }).join('');
        }

        function copyBrief(id) {
            const c = getDB().find(item => item.id === id);
            if (!c) return;
            const b = `CANDIDATE: ${c.first_name} ${c.last_name}\nROLE: ${c.role}\nLOCATION: ${c.shop}\nPHONE: ${c.mobile}\nEXP: ${c.exp}\nASE: ${c.alc_status}\nAVG RO: ${c.ro_size}\nDATE: ${c.date}\nNOTES: ${c.notes}`;
            navigator.clipboard.writeText(b).then(() => showToast("COPIED! 📋 Ready to text owner."));
        }

        function editCandidate(id) {
            const c = getDB().find(item => item.id === id);
            if (!c) return;
            document.getElementById('edit-id').value = c.id;
            ['first_name','last_name','mobile','shop','role','exp','cur_shop','alc_status','ro_size','email','date','notes'].forEach(k => {
                const el = document.getElementById(k);
                if (el) el.value = c[k] || '';
            });
            showView('log'); window.scrollTo(0,0);
        }

        function deleteCandidate(id) {
            if (!confirm("Delete this Candidate Card?")) return;
            const db = getDB().filter(c => c.id !== id);
            saveDB(db); renderList(); showToast("Record Deleted.");
        }

        function showView(v) {
            document.getElementById('view-log').style.display = v === 'log' ? 'block' : 'none';
            document.getElementById('view-list').style.display = v === 'list' ? 'block' : 'none';
            document.getElementById('tab-log').classList.toggle('active', v === 'log');
            document.getElementById('tab-view').classList.toggle('active', v === 'list');
            if (v === 'list') renderList();
        }

        function downloadCSV() {
            const d = getDB();
            const h = ["First","Last","Phone","Location","Role","Exp","ASE","RO","Email","Date"];
            const csv = [h.join(",")];
            d.forEach(c => csv.push([c.first_name,c.last_name,c.mobile,c.shop,c.role,c.exp,c.alc_status,c.ro_size,c.email,c.date].map(v => `"${v}"`).join(",")));
            const b = new Blob([csv.join("\n")], { type: 'text/csv' });
            const url = URL.createObjectURL(b);
            const a = document.createElement("a"); a.href = url; a.download = "candidates.csv"; a.click();
        }

        document.getElementById('date').valueAsDate = new Date();
        renderList();
    </script>
</body>
</html>

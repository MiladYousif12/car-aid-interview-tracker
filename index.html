<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interview Tracker Pro | Car Aid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-blue: #2563eb;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-lime: #a3e635;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --error-red: #f87171;
            --glass-bg: rgba(22, 27, 34, 0.95);
            
            /* Status Colors */
            --stat-pending: #8b949e;
            --stat-sent: #2563eb;
            --stat-confirmed: #a3e635;
            --stat-rejected: #f87171;
            --stat-hired: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        .container { width: 100%; max-width: 500px; margin: 0 auto; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        header { text-align: center; margin-bottom: 24px; }
        .logo-img { max-width: 130px; height: auto; margin-bottom: 12px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 24px; letter-spacing: -0.5px; }
        .version-badge { font-size: 10px; background: #238636; color: white; padding: 2px 10px; border-radius: 50px; margin-left: 8px; vertical-align: middle; }

        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 18px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--accent-blue); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .tab-btn.active-hired { background: linear-gradient(135deg, #10b981, #f59e0b); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.5); }

        /* Hired Page */
        .hired-hero {
            background: linear-gradient(135deg, rgba(16,185,129,0.15) 0%, rgba(245,158,11,0.1) 100%);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        .hired-hero .hero-count { font-size: 52px; font-weight: 900; background: linear-gradient(135deg, #10b981, #f59e0b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .hired-hero .hero-label { font-size: 14px; font-weight: 700; color: var(--accent-green); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
        .hired-hero .hero-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
        .hired-card {
            background: linear-gradient(135deg, rgba(16,185,129,0.07) 0%, rgba(245,158,11,0.05) 100%);
            border: 1px solid rgba(16,185,129,0.25);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .hired-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, #10b981, #f59e0b); }
        .hired-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #10b981, #f59e0b); color: white; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .hired-name { font-size: 20px; font-weight: 900; color: white; margin: 10px 0 4px; }
        .hired-meta { font-size: 13px; color: var(--text-dim); display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .hired-meta span { display: flex; align-items: center; gap: 6px; }
        .hired-meta b { color: white; font-weight: 600; }
        .hired-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(16,185,129,0.2); }
        .empty-hired { text-align: center; padding: 50px 20px; }
        .empty-hired .emoji { font-size: 52px; display: block; margin-bottom: 12px; }
        .empty-hired p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

        /* Parsing UI */
        .smart-parse-box {
            background: rgba(16, 185, 129, 0.08);
            border: 1px dashed var(--accent-green);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .box-header { font-size: 12px; font-weight: 800; color: var(--accent-green); margin-bottom: 12px; text-transform: uppercase; }
        .parse-textarea { width: 100%; height: 110px; background: #000; border: 1px solid var(--border-color); border-radius: 14px; color: white; padding: 14px; font-size: 15px; resize: none; outline: none; }
        .magic-btn { width: 100%; background: var(--accent-green); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 800; margin-top: 12px; cursor: pointer; }

        /* Form */
        .form-row { display: flex; gap: 12px; }
        .form-group { margin-bottom: 18px; flex: 1; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 6px; color: var(--text-dim); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 15px; color: white; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(37,99,235,0.2); }
        .submit-btn { width: 100%; background: white; color: black; border: none; border-radius: 16px; padding: 18px; font-size: 16px; font-weight: 900; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Candidate List Cleaner UI */
        .candidate-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 20px; 
            position: relative;
            overflow: hidden;
        }
        .candidate-card::before { 
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent-blue); 
        }

        .cand-name-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 15px; }
        .cand-full-name { font-weight: 800; font-size: 19px; line-height: 1.2; flex: 1; min-width: 0; word-wrap: break-word; color: white; }
        
        .role-badge { 
            font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; flex-shrink: 0; white-space: nowrap; margin-top: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .role-advisor { background: #f59e0b; color: white; }
        .role-tech { background: #a3e635; color: black; }

        .cand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 15px; font-size: 13px; color: var(--text-dim); }
        .grid-item { display: flex; align-items: center; gap: 8px; overflow: visible; }
        .grid-row-full { grid-column: span 2; display: flex; align-items: center; gap: 8px; overflow: visible; margin-top: 4px; }
        .grid-item b, .grid-row-full b { color: white; font-weight: 600; white-space: normal; word-break: break-all; }

        .icon-svg { width: 16px; height: 16px; flex-shrink: 0; }
        .icon-phone { fill: #10b981; }
        .icon-email { fill: #3b82f6; }
        .icon-loc { fill: #f87171; }
        .icon-exp { fill: #fbbf24; }

        .ase-img { height: 20px; width: auto; vertical-align: middle; border-radius: 2px; flex-shrink: 0; }
        
        .cand-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .action-btn { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-copy { background: var(--accent-orange); color: white; flex: 2; height: 48px; }
        .btn-edit { background: rgba(255,255,255,0.05); color: white; flex: 1; border: 1px solid var(--border-color); height: 48px; }
        .btn-del { background: rgba(248,113,113,0.05); color: #f87171; border: 1px solid rgba(248,113,113,0.2); flex: 1; height: 48px; }

        .status-badge {
            font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; margin-top: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: inline-flex; align-items: center; gap: 4px;
        }
        .status-pending { background: var(--stat-pending); color: white; }
        .status-sent { background: var(--stat-sent); color: white; }
        .status-confirmed { background: var(--stat-confirmed); color: black; }
        .status-rejected { background: var(--stat-rejected); color: white; }
        .status-hired { background: var(--stat-hired); color: white; }

            .quick-status-select {
                background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-color);
                border-radius: 10px; padding: 4px 8px; font-size: 11px; font-weight: 700; outline: none;
                cursor: pointer; -webkit-appearance: none; appearance: none;
            }

            #toast {
                position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
                background: #10b981; color: white; padding: 20px 30px; border-radius: 20px;
                font-weight: 900; z-index: 10000; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
                display: none; text-align: center; min-width: 280px; border: 2px solid rgba(255,255,255,0.3);
            }

            @keyframes fieldGlow { 0% { background: rgba(16,185,129,0.3); } 100% { background: var(--input-bg); } }
            .parsed-field { animation: fieldGlow 1s forwards; }

            /* Auth UI */
            #auth-overlay {
                position: fixed; inset: 0; background: var(--bg-color); z-index: 99999;
                display: flex; align-items: center; justify-content: center; padding: 20px;
                background-image: 
                    radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.2) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            }
            .auth-card { width: 100%; max-width: 400px; }
            .auth-mode-toggle { text-align: center; margin-top: 20px; color: var(--text-dim); font-size: 13px; }
            .auth-mode-toggle span { color: var(--accent-blue); cursor: pointer; font-weight: 700; }
            .logout-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
            .user-info { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
            .btn-logout { background: transparent; border: 1px solid var(--border-color); color: var(--error-red); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; }
            .admin-only { display: none; } /* Hidden by default, shown via JS if admin */

            /* PDF / Print Layout */
            @media print {
[diff_block_end]
            body { background: white !important; color: black !important; padding: 0 !important; }
            .container { max-width: 100% !important; }
            .card { background: white !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; backdrop-filter: none !important; }
            header, .tabs, #view-log, .db-header-row, .cand-actions, #toast, .action-btn { display: none !important; }
            #view-list { display: block !important; padding: 0 !important; }
            .candidate-card { 
                background: white !important; 
                border: 1px solid #eee !important; 
                page-break-inside: avoid; 
                margin-bottom: 20px !important; 
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .cand-full-name { color: black !important; font-size: 20pt !important; }
            .grid-item b, .grid-row-full b { color: black !important; }
            .icon-phone { fill: #10b981 !important; }
            .icon-email { fill: #3b82f6 !important; }
            .role-badge { color: white !important; box-shadow: none !important; }
            .role-advisor { background: #f59e0b !important; }
            .role-tech { background: #10b981 !important; color: white !important; }
            .ase-img { filter: grayscale(0) !important; opacity: 1 !important; }
            .status-badge { border: 1px solid #ccc !important; color: black !important; background: white !important; }
            .quick-status-select { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="auth-overlay" style="display:flex;">
        <div class="auth-card card" style="margin-bottom:0;">
            <header>
                <img src="logo.png" alt="Car Aid" class="logo-img" style="max-width: 140px; height: auto; margin-bottom: 25px;">
                <h1>Car Aid Access</h1>
            </header>
            <div id="auth-form">
                <div class="form-group"><label>Email</label><input type="email" id="auth-email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="auth-password" required></div>
                <button class="submit-btn" id="btn-login" onclick="handleAuth('login')">🔑 LOGIN</button>

            </div>
            <div id="auth-msg" style="margin-top:15px; font-size:12px; color:var(--error-red); text-align:center;"></div>
        </div>
    </div>

    <div class="container" id="app-container" style="display:none;">
        <div class="logout-row">
            <div class="user-info">Logged in as: <span id="current-user-email">...</span> <span id="role-tag" class="version-badge">USER</span></div>
            <button class="btn-logout" onclick="signOut()">LOGOUT 🚪</button>
        </div>

                // ROW 2: HEADER ROW
                const headerRow = sheet.addRow(['Candidate Name', 'Role', 'Shop', 'Phone', '▼ STATUS (Tap Here)', 'Notes']);

                    cell.border = { bottom: { style: 'medium', color: { argb: 'FF1A4AB5' } } };
                });
                headerRow.height = 32;

                // DATA ROWS
                const firstDataRow = 3;
                data.forEach((c, i) => {
                    const row = sheet.addRow([
                        `${c.first_name || ''} ${c.last_name || ''}`.trim(),
                        c.role   || '',
                        c.shop   || '',
                        c.mobile || '',
                        '',
                        c.notes || ''
                    ]);

                    // Alternating row color
                    const bg = i % 2 === 0 ? 'FFF8FAFF' : 'FFEFF4FF';
                    row.eachCell(cell => {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bg } };
                        cell.alignment = { vertical: 'middle', wrapText: true };
                    });

                    // Highlight the STATUS cell yellow so it's obvious
                    const statusCell = row.getCell(5);
                    statusCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFBE6' } };

                        right:  { style: 'thin', color: { argb: 'FFFFC107' } }
                    };
                    row.height = 26;

                // This is what makes Numbers show dropdowns on EVERY row reliably
                sheet.dataValidations.add(`E${firstDataRow}:E${lastDataRow}`, {
                    type: 'list',

        function importCSV(input) {
            const file = input.files[0];
            if (!file) return;
            showToast("Reading CSV...");
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').filter(r => r.trim() !== "");
                if (rows.length < 2) return showToast("Empty or invalid CSV.", true);
                
                const headers = rows[0].toLowerCase().split(',');
                const newCandidates = rows.slice(1).map(row => {
                    const vals = row.split(',').map(v => v.replace(/"/g, '').trim());
                    const obj = { id: Date.now() + Math.random().toString(36).substr(2, 5) };
                    
                    // Simple map based on common headers
                    headers.forEach((h, i) => {
                        if (h.includes('first')) obj.first_name = vals[i];
                        if (h.includes('last')) obj.last_name = vals[i];
                        if (h.includes('mobile') || h.includes('phone')) obj.mobile = vals[i];
                        if (h.includes('email')) obj.email = vals[i];
                        if (h.includes('shop')) obj.shop = vals[i];
                        if (h.includes('status')) obj.status = vals[i] || "Pending";
                    });
                    return obj;
                });

                if (confirm(`Import ${newCandidates.length} candidates? This will merge with existing data.`)) {
                    const current = getDB();
                    saveDB([...current, ...newCandidates]);
                    renderList();
                    showToast(`✅ Successfully Imported ${newCandidates.length} Candidates!`);
                }
            };
            reader.readAsText(file);
        }

        function runSmartParse() {
            const text = document.getElementById('raw-text').value;
            if (!text.trim()) return showToast("Paste text first!", true);

            let found = 0;
            const textLower = text.toLowerCase();

            // 1. ROLES & LOCATIONS
            if (textLower.includes('service advisor') || textLower.includes('advisor')) { 
                if (setField('role', 'Service Advisor')) found++; 
            } else if (textLower.includes('a-level technician') || textLower.includes('technician') || textLower.includes('tech')) { 
                if (setField('role', 'A-Level Technician')) found++; 
            }

            const locs = ['southfield', 'waterford', 'troy', 'shelby township', 'utica'];
            for (const l of locs) {
                if (textLower.includes(l)) {
                    const formatted = l.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    if (setField('shop', formatted)) { found++; break; }
                }
            }

            // 2. KEYWORDS
            const map = [
                { id: 'first_name', keys: ['first name'] },
                { id: 'last_name', keys: ['last name'] },
                { id: 'mobile', keys: ['phone number', 'phone'] },
                { id: 'email', keys: ['email address', 'email'] },
                { id: 'shop', keys: ['shop location', 'shop'] },
                { id: 'exp', keys: ['years experience', 'years'] },
                { id: 'cur_shop', keys: ['current shop'] },
                { id: 'alc_status', keys: ['alc status', 'ase status'] },
                { id: 'ro_size', keys: ['average ro size', 'ro size'] }
            ];

            text.split('\n').forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const key = parts[0].toLowerCase().trim();
                    const val = parts.slice(1).join(':').trim();
                    map.forEach(m => {
                        if (m.keys.some(k => key.includes(k)) && val) {
                            if (setField(m.id, val)) found++;
                        }
                    });
                }
            });

            // 3. PHONE FALLBACK
            if (!document.getElementById('mobile').value) {
                const p = text.match(/(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/);
                if (p && setField('mobile', p[0])) found++;
            }

            if (found > 0) showToast(`✅ SUCCESS!\nScanned ${found} details.`);
            else showToast("❌ NO DATA FOUND.\nCheck labels/colons.", true);
        }

                        <select class="quick-status-select" onchange="updateStatus('${c.id}', this.value)" style="flex: 1.5; min-width: 0;">

        async function updateStatus(id, newStatus) {
            console.log("Updating status for", id, "to", newStatus);
            const db = getDB();
            const idx = db.findIndex(c => String(c.id) === String(id));
            if (idx > -1) {
                db[idx].status = newStatus;
                GLOBAL_DATA = db;
                
                // Cloud Sync
                await saveToCloud(db[idx]);
                
                renderList();
                renderHired(); // keep hired page in sync
                if (newStatus === 'Hired') showToast('🏆 Added to Hired Team!');
                else showToast(`Status: ${newStatus}`);
            } else {
                console.error("Candidate not found for ID:", id);
            }
        }

        function copyBrief(id) {
            const c = getDB().find(item => item.id === id);
            if (!c) return;
            const b = `CANDIDATE: ${c.first_name} ${c.last_name}\nSTATUS: ${c.status || 'Pending'}\nROLE: ${c.role}\nLOCATION: ${c.shop}\nPHONE: ${c.mobile}\nEXP: ${c.exp}\nASE: ${c.alc_status}\nAVG RO: ${c.ro_size}\nDATE: ${c.date}\nNOTES: ${c.notes}`;
            navigator.clipboard.writeText(b).then(() => showToast("COPIED! 📋 Ready to text owner."));
        }

        function editCandidate(id) {
            const c = getDB().find(item => item.id === id);
            if (!c) return;
            document.getElementById('edit-id').value = c.id;
            ['first_name','last_name','mobile','shop','role','exp','cur_shop','alc_status','ro_size','email','status','date','notes'].forEach(k => {
                const el = document.getElementById(k);
                if (el) el.value = c[k] || (k === 'status' ? 'Pending' : '');
            });
            showView('log'); window.scrollTo(0,0);
        }

        async function deleteCandidate(id) {
            if (!confirm("Delete this Candidate Card?")) return;
            const db = getDB().filter(c => c.id !== id);
            GLOBAL_DATA = db;
            
            // Cloud Sync
            await deleteFromCloud(id);
            
            renderList(); 
            showToast("Record Deleted.");
        }

        function showView(v) {
            document.getElementById('view-log').style.display    = v === 'log'    ? 'block' : 'none';
            document.getElementById('view-list').style.display   = v === 'list'   ? 'block' : 'none';
            document.getElementById('view-hired').style.display  = v === 'hired'  ? 'block' : 'none';
            document.getElementById('tab-log').className   = 'tab-btn' + (v === 'log'   ? ' active' : '');
            document.getElementById('tab-view').className  = 'tab-btn' + (v === 'list'  ? ' active' : '');
            document.getElementById('tab-hired').className = 'tab-btn' + (v === 'hired' ? ' active-hired' : '');
            if (v === 'list')   renderList();
            if (v === 'hired')  renderHired();
        }

                function downloadCSV() {
            const d = getDB();
            const h = ["First","Last","Phone","Location","Role","Exp","ASE","RO","Email","Status","Date"];
            const csv = [h.join(",")];
            d.forEach(c => csv.push([c.first_name,c.last_name,c.mobile,c.shop,c.role,c.exp,c.alc_status,c.ro_size,c.email,c.status || "Pending",c.date].map(v => `"${v}"`).join(",")));
            const b = new Blob([csv.join("\n")], { type: 'text/csv' });
            const url = URL.createObjectURL(b);
            const a = document.createElement("a"); a.href = url; a.download = "candidates.csv"; a.click();
        }

        async function downloadPDF() {
            window.print();
        }

        document.getElementById('date').valueAsDate = new Date();
        // initApp handles the first render

        function renderHired() {
            const hired = getDB().filter(c => c.status === 'Hired');
            const container = document.getElementById('hired-container');
            const countEl   = document.getElementById('hired-count');
            const subEl     = document.getElementById('hired-sub');

            countEl.textContent = hired.length;

            if (hired.length === 0) {
                subEl.textContent = 'No hires yet — update a candidate\'s status to Hired!';
                container.innerHTML = `
                    <div class="empty-hired">
                        <span class="emoji">🏆</span>
                        <p>Your hired team will appear here automatically<br>as soon as you mark a candidate as <b>Hired</b>.</p>
                    </div>`;
                return;
            }

            subEl.textContent = `Last updated: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

            container.innerHTML = hired.map(c => {
                const isAdv = c.role && c.role.toLowerCase().includes('advisor');
                return `
                <div class="hired-card">
                    <div class="hired-badge">✅ Hired</div>
                    <div class="hired-name">${c.first_name || ''} ${c.last_name || ''}</div>
                    <span class="role-badge ${isAdv ? 'role-advisor' : 'role-tech'}" style="font-size:9px;">${c.role || 'N/A'}</span>
                    <div class="hired-meta">
                        <span>
                            <svg class="icon-svg icon-phone" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                            <b>${c.mobile || 'N/A'}</b>
                        </span>
                        <span>
                            <svg class="icon-svg icon-loc" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                            <b>${c.shop || 'N/A'}</b>
                        </span>
                        ${c.date ? `<span>📅 <b>${c.date}</b></span>` : ''}
                        ${c.email ? `<span><svg class="icon-svg icon-email" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg><b>${c.email}</b></span>` : ''}
                        ${c.notes ? `<span style="grid-column:span 2;">📝 <b>${c.notes}</b></span>` : ''}
                    </div>
                    <div class="hired-actions">
                        <button class="action-btn btn-copy" onclick="copyBrief('${c.id}')">📋 SHARE</button>
                        <button class="action-btn btn-edit" onclick="editCandidate('${c.id}'); showView('log');">✏️ EDIT</button>
                    </div>
                </div>`;
            }).join('');
        }

        // initApp handles the first render
        initApp();
    </script>
